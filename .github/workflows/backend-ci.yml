name: Backend CI

on:
  push:
    paths:
      - 'backend/**'
      - '.github/workflows/backend-ci.yml'
  pull_request:
    paths:
      - 'backend/**'
      - '.github/workflows/backend-ci.yml'

jobs:
  test:
    runs-on: ubuntu-latest
    
    services:
      neo4j:
        image: neo4j:5
        env:
          NEO4J_AUTH: neo4j/mytick123
        ports:
          - 7687:7687
        options: >-
          --health-cmd "cypher-shell -u neo4j -p mytick123 'RETURN 1'"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    
    env:
      NEO4J_URI: bolt://localhost:7687
      NEO4J_USER: neo4j
      NEO4J_PASSWORD: mytick123
      JWT_SECRET: test-secret-key-for-ci
      ADMIN_KEY: test-admin-key-for-ci
    
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: backend/package-lock.json
      - run: npm ci
        working-directory: backend
      - run: npm test
        working-directory: backend
      - run: npx tsc --noEmit
        working-directory: backend
