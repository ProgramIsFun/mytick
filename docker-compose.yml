version: '3.8'

services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile.dev
    container_name: mytick-backend
    ports:
      - "4000:4000"
    volumes:
      - ./backend:/app
      - /app/node_modules
    environment:
      - NODE_ENV=development
    env_file:
      - ./backend/.env

  backend-test:
    build:
      context: ./backend
      dockerfile: Dockerfile.test
    container_name: mytick-backend-test
    volumes:
      - ./backend:/app
      - /app/node_modules
    environment:
      - NODE_ENV=test
    env_file:
      - ./backend/.env
    entrypoint: ["npm", "test"]
    profiles: ["test"]

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile.dev
    container_name: mytick-frontend
    ports:
      - "5173:5173"
    volumes:
      - ./frontend:/app
      - /app/node_modules
    environment:
      - NODE_ENV=development
      - CHOKIDAR_USEPOLLING=true
