services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile.dev
    container_name: mytick-backend
    ports:
      - "4000:4000"
    volumes:
      - ./backend:/app
      - /app/node_modules
    environment:
      - NODE_ENV=development
      - CHOKIDAR_USEPOLLING=true
      - NEO4J_URI=bolt://neo4j:7687
      - NEO4J_USER=neo4j
      - NEO4J_PASSWORD=mytick123
    env_file:
      - ./backend/.env
    depends_on:
      - neo4j

  neo4j:
    image: neo4j:5
    container_name: mytick-neo4j
    ports:
      - "7474:7474"
      - "7687:7687"
    environment:
      - NEO4J_AUTH=neo4j/mytick123
      - NEO4J_PLUGINS=["apoc"]
    volumes:
      - neo4j-data:/data
      - neo4j-logs:/logs

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile.dev
    container_name: mytick-frontend
    ports:
      - "5173:5173"
    volumes:
      - ./frontend:/app
      - /app/node_modules
    environment:
      - NODE_ENV=development
      - CHOKIDAR_USEPOLLING=true

volumes:
  neo4j-data:
  neo4j-logs:
